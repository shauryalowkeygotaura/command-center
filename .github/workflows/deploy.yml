name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # The Stop hook pushes the token feed every ~5min; the live panel reads it
    # from raw GitHub, so those commits must NOT trigger a full Pages rebuild.
    paths-ignore:
      - "public/status/cc-usage.json"
      # Classroom sync commits its feed on a cron; the rail reads it from raw
      # GitHub, so it must not trigger a rebuild either.
      - "public/status/classroom-deadlines.json"
      # The site-alive feed (shipping + studying) is read from raw GitHub by
      # the portfolio panel; refreshing it must not rebuild Pages either.
      - "public/status/now.json"
  workflow_dispatch:

# Run the bundled JS actions (checkout, setup-node, *-pages) on Node 24
# instead of the deprecated Node 20 runtime. GitHub forces this from
# 2026-06-16; opting in early silences the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          # Project page served from /<repo>. Drop this if you ever move
          # to a root user/org site (<name>.github.io).
          NEXT_PUBLIC_BASE_PATH: /command-center
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
